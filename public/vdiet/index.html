markers.forEach(function(p) {
  var color = p.gender === 'Ж' ? '#e74c3c' : '#3498db';
  var opacity = p.tg === 'да' ? 1 : 0.4;
  var marker = L.circleMarker([p.lat, p.lon], {
    radius: 5, fillColor: color, color: '#fff', weight: 1,
    fillOpacity: opacity, opacity: opacity
  });
  marker.bindPopup('<b>' + p.name + '</b><br>' + p.addr + '<br>Пол: ' + p.gender + ' | TG: ' + p.tg);
  markerLayer.addLayer(marker);
});

function toggleHeat(btn) {
  if (map.hasLayer(heatLayer)) {
    map.removeLayer(heatLayer); btn.classList.remove('active');
  } else {
    map.addLayer(heatLayer); btn.classList.add('active');
  }
}
function toggleMarkers(btn) {
  if (map.hasLayer(markerLayer)) {
    map.removeLayer(markerLayer); btn.classList.remove('active');
  } else {
    map.addLayer(markerLayer); btn.classList.add('active');
  }
}
